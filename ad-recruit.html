<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BUDO LINK — 新歓支援広告</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: #e8f0fe;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 16px;
    }

    /* ===== ダウンロードボタン ===== */
    .dl-btn {
      background: linear-gradient(135deg, #0028FF, #00C8FF);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 12px 36px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,40,255,0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .dl-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,40,255,0.4); }
    .dl-btn:active { transform: translateY(0); }

    /* ===== ポスター本体 ===== */
    .poster {
      width: 100%;
      max-width: 500px;
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,40,255,0.15);
    }

    /* ===== ヘッダー ===== */
    .header {
      background: linear-gradient(135deg, #0028FF 0%, #0077FF 55%, #00C8FF 100%);
      padding: 30px 28px 26px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 20px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      position: relative; z-index: 1;
    }
    .logo-badge {
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.65rem;
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.12em;
    }
    .logo span { color: #7FEFFF; }

    .header-catch {
      font-size: 1.75rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.35;
      position: relative; z-index: 1;
    }
    .header-catch .yellow { color: #FFE566; }

    .header-sub {
      margin-top: 8px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.88);
      line-height: 1.65;
      position: relative; z-index: 1;
    }

    /* ===== 種目タグ ===== */
    .tag-band {
      background: #f0f5ff;
      padding: 10px 20px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-bottom: 1px solid #dde8ff;
    }
    .tag-band span {
      font-size: 0.7rem;
      color: #0040CC;
      background: #dde8ff;
      border-radius: 20px;
      padding: 3px 10px;
      font-weight: 700;
    }

    /* ===== 特典 ===== */
    .benefits {
      padding: 18px 24px 14px;
      background: #fff;
    }
    .benefits-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #0040CC;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .benefit-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .benefit-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #f0f5ff;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.75rem;
      color: #1a3a8a;
      font-weight: 700;
    }
    .benefit-pill .icon { font-size: 0.85rem; }

    /* ===== QRコード強調エリア ===== */
    .qr-section {
      padding: 20px 24px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(180deg, #fff 0%, #f4f8ff 100%);
    }
    .qr-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #0040CC;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .qr-frame {
      position: relative;
      padding: 16px;
      background: #fff;
      border-radius: 24px;
      box-shadow:
        0 0 0 3px #0028FF,
        0 12px 40px rgba(0,40,255,0.2),
        0 4px 12px rgba(0,40,255,0.1);
    }
    .qr-frame::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(0,40,255,0.08), rgba(0,200,255,0.08));
      z-index: -1;
    }
    .qr-frame img {
      width: 190px;
      height: 190px;
      display: block;
    }
    .qr-badge {
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #0028FF, #00C8FF);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 900;
      padding: 4px 16px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.06em;
      box-shadow: 0 3px 10px rgba(0,40,255,0.35);
    }

    /* ===== 登録ステップ ===== */
    .steps {
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 28px 20px 22px;
      background: #f4f8ff;
    }
    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }
    .step-item:not(:last-child)::after {
      content: '→';
      position: absolute;
      right: -6px;
      top: 14px;
      color: #0028FF;
      font-size: 1rem;
      font-weight: 900;
    }
    .step-circle {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0028FF, #00C8FF);
      color: #fff;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 6px;
      box-shadow: 0 4px 12px rgba(0,40,255,0.3);
    }
    .step-name {
      font-size: 0.72rem;
      font-weight: 700;
      color: #1a3a8a;
      text-align: center;
    }

    /* ===== フッター ===== */
    .footer {
      background: linear-gradient(90deg, #0028FF, #0077FF, #00C8FF);
      padding: 14px 24px;
      text-align: center;
    }
    .footer-text {
      font-size: 0.82rem;
      color: #fff;
      font-weight: 900;
      letter-spacing: 0.06em;
    }
    .footer-text span { color: #FFE566; }

    /* ===== 印刷用 ===== */
    @media print {
      body { background: white; padding: 0; }
      .poster { box-shadow: none; max-width: 100%; border-radius: 0; }
      .dl-btn { display: none; }
    }
  </style>
</head>
<body>

  <button class="dl-btn" onclick="downloadPDF()">
    ⬇️ PDFをダウンロード
  </button>

  <div class="poster" id="poster">

    <!-- ヘッダー -->
    <div class="header">
      <div class="logo-wrap">
        <div class="logo">BUDO <span>LINK</span></div>
        <div class="logo-badge">武道系学生専用</div>
      </div>
      <h1 class="header-catch">
        登録して<br>
        <span class="yellow">新歓支援</span>を受け取ろう
      </h1>
      <p class="header-sub">
        武道系学生のための無料支援サービス。<br>お得な情報からアルバイト・就活まで全部届く。
      </p>
    </div>

    <!-- 種目タグ -->
    <div class="tag-band">
      <span>⚔️ 剣道</span>
      <span>🥋 柔道</span>
      <span>🥊 空手</span>
      <span>🏹 弓道</span>
      <span>☯️ 合気道</span>
      <span>🤼 相撲</span>
      <span>🥷 少林寺</span>
      <span>＋ その他武道</span>
    </div>

    <!-- 特典 -->
    <div class="benefits">
      <div class="benefits-label">登録するとできること</div>
      <div class="benefit-row">
        <div class="benefit-pill"><span class="icon">🎁</span> お得情報の発信</div>
        <div class="benefit-pill"><span class="icon">💼</span> アルバイト情報</div>
        <div class="benefit-pill"><span class="icon">🏢</span> 求人・インターン</div>
        <div class="benefit-pill"><span class="icon">🎓</span> 就活対策JOBLAB</div>
        <div class="benefit-pill"><span class="icon">📩</span> 企業スカウト</div>
        <div class="benefit-pill"><span class="icon">👔</span> OB/OG訪問</div>
      </div>
    </div>

    <!-- QRコード強調 -->
    <div class="qr-section">
      <div class="qr-label">▼ QRコードを読み取って今すぐ登録 ▼</div>
      <div class="qr-frame">
        <img src="qr_codes/L_gainfriends_2dbarcodes_GW.png" alt="BUDO LINK LINE登録QRコード">
        <div class="qr-badge">LINE公式アカウント</div>
      </div>
    </div>

    <!-- 登録ステップ（サブ文なし） -->
    <div class="steps">
      <div class="step-item">
        <div class="step-circle">📷</div>
        <div class="step-name">QR読み取り</div>
      </div>
      <div class="step-item">
        <div class="step-circle">➕</div>
        <div class="step-name">友だち追加</div>
      </div>
      <div class="step-item">
        <div class="step-circle">📝</div>
        <div class="step-name">アンケート回答</div>
      </div>
    </div>

    <!-- フッター -->
    <div class="footer">
      <div class="footer-text">完全無料 · 登録1分 · <span>新歓支援を受け取ろう</span></div>
    </div>

  </div>

  <script>
    async function downloadPDF() {
      const btn = document.querySelector('.dl-btn');
      btn.textContent = '⏳ 生成中...';
      btn.disabled = true;

      try {
        const { jsPDF } = window.jspdf;
        const poster = document.getElementById('poster');

        const canvas = await html2canvas(poster, {
          scale: 3,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false
        });

        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        const pxW = canvas.width;
        const pxH = canvas.height;

        // A4縦に収める
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();

        const ratio = Math.min(pageW / pxW, pageH / pxH);
        const imgW = pxW * ratio;
        const imgH = pxH * ratio;
        const offsetX = (pageW - imgW) / 2;
        const offsetY = (pageH - imgH) / 2;

        pdf.addImage(imgData, 'JPEG', offsetX, offsetY, imgW, imgH);
        pdf.save('BUDOLINK_新歓支援広告.pdf');

      } catch (err) {
        alert('PDFの生成に失敗しました: ' + err.message);
      } finally {
        btn.textContent = '⬇️ PDFをダウンロード';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
