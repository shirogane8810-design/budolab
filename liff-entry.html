<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BUDO LINK</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #0028FF 60%, #00C8FF 100%);
    }

    /* ── ローディング画面 ── */
    #loading-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo { font-size: 1.6rem; font-weight: 900; color: #0028FF; letter-spacing: 0.06em; margin-bottom: 24px; }
    .logo span { color: #00C8FF; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #eef0f6;
      border-top-color: #0028FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 0.9rem; color: #5a6577; line-height: 1.8; }
    .step {
      display: flex; align-items: center; gap: 10px;
      background: #f4f6fb; border-radius: 10px;
      padding: 10px 14px; margin-top: 8px;
      font-size: 0.82rem; color: #5a6577; text-align: left;
    }
    .step.active { background: rgba(0,40,255,0.06); color: #0028FF; font-weight: 600; }
    .step.done { color: #22c55e; }
    .step-icon { font-size: 1rem; flex-shrink: 0; }

    /* ── フォーム画面 ── */
    #form-wrap {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      padding: 16px;
    }
    .form-header {
      text-align: center;
      padding: 12px 0 14px;
    }
    .form-header .logo { margin-bottom: 6px; }
    .form-header p { font-size: 0.82rem; color: rgba(255,255,255,0.85); }
    #survey-frame {
      width: 100%;
      flex: 1;
      border: none;
      border-radius: 14px;
      min-height: 72vh;
      background: #fff;
    }
    .form-footer {
      text-align: center;
      padding: 14px 0 8px;
    }
    #done-btn {
      background: #fff;
      color: #0028FF;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      padding: 13px 36px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      letter-spacing: 0.04em;
    }
    #done-btn:active { opacity: 0.8; }
    .form-footer small { display: block; margin-top: 8px; color: rgba(255,255,255,0.6); font-size: 0.75rem; }
  </style>
</head>
<body>

  <!-- ローディング画面 -->
  <div id="loading-wrap">
    <div class="card">
      <div class="logo">BUDO <span>LINK</span></div>
      <div class="spinner" id="spinner"></div>
      <p id="msg">LINEと連携中...</p>
      <div style="margin-top:20px;">
        <div class="step active" id="step1"><span class="step-icon">🔐</span> LIFF初期化中</div>
        <div class="step" id="step2"><span class="step-icon">👤</span> プロフィール取得中</div>
        <div class="step" id="step3"><span class="step-icon">🚀</span> アンケートを表示</div>
      </div>
    </div>
  </div>

  <!-- フォーム画面 -->
  <div id="form-wrap">
    <div class="form-header">
      <div class="logo">BUDO <span>LINK</span></div>
      <p>アンケートに回答後、下の「送信完了」ボタンを押してください</p>
    </div>
    <iframe id="survey-frame" src="" allowfullscreen></iframe>
    <div class="form-footer">
      <button id="done-btn" onclick="goToPortal()">✅ 送信完了 → ポータルへ戻る</button>
      <small>Googleフォームで送信した後にタップしてください</small>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009131828-EL8cWuuz';

    function setStep(n) {
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('step' + i);
        el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
      }
    }

    function showError(msg, code) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').innerHTML =
        '⚠️ エラーが発生しました。<br>LINEアプリから開き直してください。<br>'
        + '<small style="color:#aaa">' + msg + (code ? ' [' + code + ']' : '') + '</small>';
    }

    function goToPortal() {
      location.href = 'student-portal.html?from=liff';
    }

    (async () => {
      try {
        setStep(1);
        await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: location.href });
          return;
        }

        setStep(2);
        const profile = await liff.getProfile();

        setStep(3);
        const formUrl =
          'https://docs.google.com/forms/d/e/1FAIpQLSfpVqMAcvrnfEzK5dxWwleDCNd_r8HlltL0J7FgVNkhyVa8nA/viewform'
          + '?entry.1199573303=' + encodeURIComponent(profile.userId)
          + '&embedded=true';

        // フォームをiframeで表示
        document.getElementById('loading-wrap').style.display = 'none';
        document.getElementById('survey-frame').src = formUrl;
        document.getElementById('form-wrap').style.display = 'flex';

      } catch (e) {
        showError(e.message || String(e), e.code || e.errorCode || '');
        console.error(e);
      }
    })();
  </script>
</body>
</html>
