<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <!-- ═══ SECURITY HEADERS ═══ -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://script.google.com https://apis.google.com https://fonts.googleapis.com https://static.line-scdn.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://script.google.com https://joblab.anca.co.jp https://lin.ee https://api.line.me https://access.line.me https://liff.line.me https://static.line-scdn.net https://obs.line-scdn.net; frame-src https://joblab.anca.co.jp https://lin.ee https://access.line.me https://liff.line.me; object-src 'none'; base-uri 'self'; form-action 'self' https://script.google.com https://docs.google.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">
  <!-- ══════════════════════ -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BUDO LINK</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a1628 0%, #0028FF 60%, #00C8FF 100%);
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo { font-size: 1.6rem; font-weight: 900; color: #0028FF; letter-spacing: 0.06em; margin-bottom: 24px; }
    .logo span { color: #00C8FF; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #eef0f6;
      border-top-color: #0028FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 0.9rem; color: #5a6577; line-height: 1.8; }
    .step {
      display: flex; align-items: center; gap: 10px;
      background: #f4f6fb; border-radius: 10px;
      padding: 10px 14px; margin-top: 8px;
      font-size: 0.82rem; color: #5a6577; text-align: left;
    }
    .step.active { background: rgba(0,40,255,0.06); color: #0028FF; font-weight: 600; }
    .step.done { color: #22c55e; }
    .step-icon { font-size: 1rem; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">BUDO <span>LINK</span></div>
    <div class="spinner" id="spinner"></div>
    <p id="msg">LINEと連携中...</p>
    <div style="margin-top:20px;">
      <div class="step active" id="step1"><span class="step-icon">🔐</span> LIFF初期化中</div>
      <div class="step" id="step2"><span class="step-icon">👤</span> プロフィール取得中</div>
      <div class="step" id="step3"><span class="step-icon">🚀</span> アンケートへ移動</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009131828-EL8cWuuz';

    function setStep(n) {
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('step' + i);
        el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
      }
    }

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').innerHTML =
        '⚠️ エラーが発生しました。<br>LINEアプリから開き直してください。<br><small style="color:#aaa">' + msg + '</small>';
    }

    (async () => {
      try {
        setStep(1);
        await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: location.href });
          return;
        }

        setStep(2);
        const profile = await liff.getProfile();

        setStep(3);
        const formUrl =
          'https://docs.google.com/forms/d/e/1FAIpQLSfpVqMAcvrnfEzK5dxWwleDCNd_r8HlltL0J7FgVNkhyVa8nA/viewform'
          + '?entry.1199573303=' + encodeURIComponent(profile.userId);

        // アンケートフォームへ LINE User ID を自動入力して遷移
        location.replace(formUrl);

      } catch (e) {
        showError(e.message || String(e));
        console.error(e);
      }
    })();
  </script>
</body>
</html>
