<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <!-- ═══ SECURITY HEADERS ═══ -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.line-scdn.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https://api.line.me https://access.line.me https://liff.line.me; frame-src https://access.line.me https://liff.line.me; object-src 'none'; base-uri 'self'; form-action 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">
  <!-- ══════════════════════ -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BUDO LINK アンケート</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a1628 0%, #0028FF 60%, #00C8FF 100%);
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo { font-size: 1.6rem; font-weight: 900; color: #0028FF; letter-spacing: 0.06em; margin-bottom: 24px; }
    .logo span { color: #00C8FF; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #eef0f6;
      border-top-color: #0028FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 0.9rem; color: #5a6577; line-height: 1.8; margin-bottom: 4px; }
    .step {
      display: flex; align-items: center; gap: 10px;
      background: #f4f6fb; border-radius: 10px;
      padding: 10px 14px; margin-top: 8px;
      font-size: 0.82rem; color: #5a6577; text-align: left;
    }
    .step.active { background: rgba(0,40,255,0.06); color: #0028FF; font-weight: 600; }
    .step.done { background: #f0fff4; color: #22c55e; }
    .step.error { background: #fff5f5; color: #e53e3e; }
    .step-icon { font-size: 1rem; flex-shrink: 0; }
    .error-box {
      display: none;
      margin-top: 20px;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 12px;
      padding: 16px;
      text-align: left;
    }
    .error-box .err-title { font-size: 0.88rem; font-weight: 700; color: #c53030; margin-bottom: 8px; }
    .error-box .err-detail { font-size: 0.76rem; color: #aaa; word-break: break-all; margin-bottom: 12px; font-family: monospace; }
    .btn-fallback {
      display: block; width: 100%;
      background: linear-gradient(135deg, #0028FF, #00C8FF);
      color: #fff; border: none; border-radius: 50px;
      padding: 12px 20px; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; text-decoration: none; margin-top: 12px;
      transition: opacity 0.2s;
    }
    .btn-fallback:hover { opacity: 0.85; }
    .open-in-line {
      display: none;
      margin-top: 20px;
      background: #f4f6fb;
      border-radius: 12px;
      padding: 20px;
    }
    .open-in-line p { font-size: 0.88rem; color: #374151; line-height: 1.8; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">BUDO <span>LINK</span></div>
    <div class="spinner" id="spinner"></div>
    <p id="msg">LINEと連携中...</p>

    <div style="margin-top:20px;" id="stepArea">
      <div class="step active" id="step1"><span class="step-icon">🔐</span> LIFF初期化中</div>
      <div class="step" id="step2"><span class="step-icon">👤</span> プロフィール取得中</div>
      <div class="step" id="step3"><span class="step-icon">🚀</span> アンケートへ移動</div>
    </div>

    <!-- エラー時フォールバック -->
    <div class="error-box" id="errorBox">
      <div class="err-title">⚠️ エラーの詳細</div>
      <div class="err-detail" id="errDetail">—</div>
      <p style="font-size:0.82rem;color:#5a6577;margin-bottom:8px;">
        下のボタンからアンケートを開いてください（LINE IDは手動入力）
      </p>
      <a class="btn-fallback"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfpVqMAcvrnfEzK5dxWwleDCNd_r8HlltL0J7FgVNkhyVa8nA/viewform"
         target="_blank" rel="noopener">
        📋 アンケートを直接開く
      </a>
    </div>

    <!-- LINEアプリ外で開いた場合 -->
    <div class="open-in-line" id="openInLine">
      <p>📱 このページは<strong>LINEアプリ内</strong>から開いてください。</p>
      <p style="font-size:0.8rem;color:#8a95a8;">BUDO LINKの公式LINEアカウントのメニューまたはトーク画面のリンクからアクセスしてください。</p>
      <a class="btn-fallback"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfpVqMAcvrnfEzK5dxWwleDCNd_r8HlltL0J7FgVNkhyVa8nA/viewform"
         target="_blank" rel="noopener">
        📋 アンケートを直接開く（LINE IDなし）
      </a>
    </div>
  </div>

  <script>
    const LIFF_ID   = '2009131828-EL8cWuuz';
    const FORM_BASE = 'https://docs.google.com/forms/d/e/1FAIpQLSfpVqMAcvrnfEzK5dxWwleDCNd_r8HlltL0J7FgVNkhyVa8nA/viewform';
    const ENTRY_KEY = 'entry.1199573303';

    function setStep(n, isError) {
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('step' + i);
        if (i < n) {
          el.className = 'step done';
        } else if (i === n) {
          el.className = isError ? 'step error' : 'step active';
        } else {
          el.className = 'step';
        }
      }
    }

    function showError(msg, stepN) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').textContent = 'エラーが発生しました';
      if (stepN) setStep(stepN, true);
      document.getElementById('errDetail').textContent = msg;
      document.getElementById('errorBox').style.display = 'block';
      console.error('[LIFF Error]', msg);
    }

    function showOpenInLine() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').textContent = 'LINEアプリから開いてください';
      document.getElementById('stepArea').style.display = 'none';
      document.getElementById('openInLine').style.display = 'block';
    }

    (async () => {
      try {
        // ── STEP 1: LIFF初期化 ──────────────────────────
        setStep(1);
        await liff.init({ liffId: LIFF_ID });

        // LINE内ブラウザ以外は直接フォームへ誘導
        if (!liff.isInClient()) {
          showOpenInLine();
          return;
        }

        // ── STEP 2: プロフィール取得 ─────────────────────
        setStep(2);
        const profile = await liff.getProfile();

        if (!profile || !profile.userId) {
          showError('userId が取得できませんでした (profile: ' + JSON.stringify(profile) + ')', 2);
          return;
        }

        // ── STEP 3: アンケートへリダイレクト ─────────────
        setStep(3);
        const formUrl = FORM_BASE + '?' + ENTRY_KEY + '=' + encodeURIComponent(profile.userId);
        location.replace(formUrl);

      } catch (e) {
        const msg = (e && e.message) ? e.message : String(e);
        // どのステップで失敗したか判定
        const stepN = document.querySelector('.step.active')
          ? parseInt(document.querySelector('.step.active').id.replace('step', ''))
          : 1;
        showError(msg, stepN);
      }
    })();
  </script>
</body>
</html>
